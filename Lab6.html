  <!DOCTYPE html>
  <html>
  <head>
    <title>Student Info</title>
  <style>
      h1,h3{
          color:yellow;
      }
      div{
          padding:15px;
          background-color: black;
          border-radius:10px;
          width:300px;
          margin:auto;
      }
      button{
          padding:10px;
          background-color: aqua;
          border-radius:5px;
      }
      #out{
          margin-top:1px;
          padding:10px;
          background-color:aquamarine;
          color:black;
          width:250px;
      }
      input{
          padding:2px;
          border-radius:5px;
      }
  </style>
  </head>
  <body bgcolor="aqua"> 
  <center>
  <div>
  <h1>Eatheshwaran</h1> 
    <h3>Student Info</h3>
    <input type="text" id="name" placeholder="Name"><br><br>
    <input type="text" id="roll" placeholder="Roll No"><br><br>
    <input type="number" id="sub1" placeholder="Subject 1"><br><br>
    <input type="number" id="sub2" placeholder="Subject 2"><br><br>
    <input type="number" id="sub3" placeholder="Subject 3"><br><br>
    <input type="number" id="sub4" placeholder="Subject 4"><br><br>
    <input type="number" id="sub5" placeholder="Subject 5"><br><br>
    <button onclick="calc()">Calculate</button><br><br>
    <div id="out"></div>
  </div>

  <script>
  function calc() {
    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let marks = [1,2,3,4,5].map(i => Number(document.getElementById("sub"+i).value));
    
    let total = marks.reduce((a,b)=>a+b,0);
    let avg = total / marks.length;
    let result = marks.every(m => m>=35) ? "Pass" : "Fail";

    let grade = "No Grade";
    if(result=="Pass"){
      if(avg>=90) grade="A+";
      else if(avg>=80) grade="A";
      else if(avg>=70) grade="B";
      else if(avg>=60) grade="C";
      else if(avg>=50) grade="D";
      else grade="E";
    }

    document.getElementById("out").innerHTML = `
      <b>Name:</b> ${name} <br>
      <b>Roll:</b> ${roll} <br>
      <b>Total:</b> ${total} <br>
      <b>Average:</b> ${avg.toFixed(2)} <br>
      <b>Result:</b> ${result} <br>
      <b>Grade:</b> ${grade}
    `;
  }
  </script>

  </body>
  </html>
