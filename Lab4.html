<!DOCTYPE html>
<html>
<head>
  <title>Sum of N Natural Numbers</title>
  <script>
    function sumNaturalNumbers(n) {
      let sum = 0;
      for (let i = 1; i <= n; i++) {
        sum += i;
      }
      return sum;
    }

    function calculateSum() {
      let n = parseInt(document.getElementById("number").value);

      if (isNaN(n) || n <= 0) {
        document.getElementById("result").innerText = "Please enter a positive number.";
        return;
      }

      let total = sumNaturalNumbers(n);

      document.getElementById("result").innerText = "Sum of first " + n + " natural numbers is: " + total;
    }
  </script>
  <style>
    h1,h2{
      color:yellow;
    }
    #result{
color:black;
    }
  </style>  
</head>
<body style="font-family: Arial; text-align: center; background-color:plum">
  <h5>Eatheshwaran</h5>
  <h2>Sum of N Natural Numbers</h2>
  <label for="number">Enter N:</label>
  <input type="number" id="number" min="1">
  <button onclick="calculateSum()">Find Sum</button>

  <p id="result"></p>

</body>
</html>
