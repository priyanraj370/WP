 <!DOCTYPE html>
<html> 
<head> 
  <title>Math Expression Evaluator</title> 
  <script> 
    function evaluateExpression() { 
      const expression = document.getElementById("mathExpr").value; 
      let result;
      try { 
        result = eval(expression); 
        document.getElementById("result").innerText = "Result: " + result; 
      } catch (error) 
      { 
        document.getElementById("result").innerText = "Invalid Expression!"; 
      } 
    } 
  </script> 
</head> 
<br><br>
<center>
     <div  style="border: solid rgb(255, 7, 7); max-width: 500px; background-color:black; color: antiquewhite;">
        <body bgcolor="pink"> 
            <h5>Eatheshwaran</h5> 
            <h2>Mathematical Expression Evaluator</h2> 
            <form onsubmit="event.preventDefault(); evaluateExpression();"> 
                <label for="mathExpr">Enter Expression:</label> 
                <input type="text" id="mathExpr" name="mathExpr" required placeholder="e.g. 3 + 4 * (2 - 1)"> 
                <input type="submit" value="Evaluate"> 
            </form> <br>
            <p id="result"></p> 

        </body>
    </div>
</center>
</html>
