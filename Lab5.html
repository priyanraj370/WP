<!DOCTYPE html>
<html>
<head>
  <title>Date in Words</title>
  <script>
    function showDate() {
      let days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      let months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      let d = new Date();
      document.getElementById("result").innerHTML =
        "Today is " + days[d.getDay()] + ", " + d.getDate() + " " + months[d.getMonth()] + " " + d.getFullYear();
    }
  </script>
</head>
<body onload="showDate()" style="text-align:center; font-family: Arial; background-color: #e3fbff;">
  <h5>Eatheshwaran</h5>
  <h2>Current Date in Words</h2>
  <p id="result" style="font-size: 20px; color: darkblue;"></p>

</body>
</html>
